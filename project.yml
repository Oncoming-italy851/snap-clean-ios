name: SnapClean
options:
  bundleIdPrefix: com.snapclean
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "SnapClean needs access to your photo library to help you organize and clean up photos and videos."
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "SnapClean needs write access to save compressed videos and converted photos."

targets:
  SnapClean:
    type: application
    platform: iOS
    sources:
      - path: SnapClean
        excludes:
          - "Scripts/**"
    resources:
      - path: SnapClean/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snapclean.app
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: SnapClean
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait

  SnapCleanTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: SnapClean
    sources:
      - path: SnapCleanTests
    dependencies:
      - target: SnapClean
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snapclean.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1"
